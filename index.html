<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Akbar Clock</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #0f0f12;
    overflow: hidden;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    cursor: pointer;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2vmin;
  }

  /*
    HH:MM:SS = 8 karakter
    Setiap karakter lebar ≈ 0.58em (Helvetica bold tabular)
    Total teks ≈ 8 × 0.58em = 4.64em
    Agar pas: 4.64 × fontSize ≤ 96vw  →  fontSize ≤ 96vw / 4.64 ≈ 20.7vw
    Batasi juga agar tinggi tidak melebihi ~55vh
    Gunakan min(20vw, 55vh) → mengisi di semua orientasi
  */
  #time {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.01em;
    color: #d4cfc8;
    line-height: 1;
    -webkit-font-smoothing: antialiased;
    font-size: min(24.5vw, 62vh);
    white-space: nowrap;
  }

  #time .sep {
    color: #d4cfc8;
    opacity: 0.35;
  }

  #date {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #5a5a78;
    font-size: min(3.8vw, 9vh);
    white-space: nowrap;
  }


</style>
</head>
<body>

<div id="time" aria-live="polite">
  <span id="hh">00</span><span class="sep">:</span><span id="mm">00</span><span class="sep">:</span><span id="ss">00</span>
</div>
<div id="date"></div>

<!-- Video dummy anti-layar-mati. Ukuran penuh layar agar tidak diblokir Chrome.
     Tertutup background body — tidak terlihat, tapi Android tetap anggap "aktif". -->

<script>
  const DAYS   = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  const MONTHS = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];

  const hh = document.getElementById('hh');
  const mm = document.getElementById('mm');
  const ss = document.getElementById('ss');
  const dateEl = document.getElementById('date');

  function pad(n){ return n < 10 ? '0'+n : ''+n; }

  function tick(){
    const now = new Date();
    hh.textContent = pad(now.getHours());
    mm.textContent = pad(now.getMinutes());
    ss.textContent = pad(now.getSeconds());
    dateEl.textContent =
      DAYS[now.getDay()] + ', ' +
      pad(now.getDate()) + ' ' +
      MONTHS[now.getMonth()] + ' ' +
      now.getFullYear();
  }

  tick();
  setInterval(tick, 1000);

  // ── WAKE LOCK ──────────────────────────────────────────────────────────────
  // Dua lapis perlindungan agar layar tidak mati:
  // 1) Wake Lock API (navigator.wakeLock) — cara resmi, butuh https/secure context
  // 2) Video loop dummy — cadangan untuk file://, MIUI, HarmonyOS, browser lama
  //    yang sering paksa-lepas Wake Lock API karena optimasi baterai.

  const nosleepVideo = document.getElementById('nosleep-video');
  let wakeLock = null;
  let wakeLockRetryTimer = null;

  function startNoSleepVideo(){
    if(!nosleepVideo) return;
    nosleepVideo.style.display = 'block';
    const p = nosleepVideo.play();
    if(p && p.catch) p.catch(()=>{});
  }
  function stopNoSleepVideo(){
    if(!nosleepVideo) return;
    nosleepVideo.pause();
    nosleepVideo.style.display = 'none';
  }
  // Putar ulang kalau video kepause sendiri selagi fullscreen aktif
  nosleepVideo && nosleepVideo.addEventListener('pause', ()=>{
    if(isFull && document.visibilityState === 'visible') startNoSleepVideo();
  });

  async function requestWakeLock(){
    startNoSleepVideo();
    try{
      if('wakeLock' in navigator){
        wakeLock = await navigator.wakeLock.request('screen');
        wakeLock.addEventListener('release', ()=>{
          wakeLock = null;
          // Auto-retry kalau dilepas paksa oleh sistem selagi masih fullscreen
          if(isFull && document.visibilityState === 'visible'){
            clearTimeout(wakeLockRetryTimer);
            wakeLockRetryTimer = setTimeout(requestWakeLock, 700);
          }
        });
      }
    } catch(e){}
  }
  function releaseWakeLock(){
    clearTimeout(wakeLockRetryTimer);
    if(wakeLock){ wakeLock.release().catch(()=>{}); wakeLock = null; }
    stopNoSleepVideo();
  }
  // Re-acquire saat tab kembali aktif
  document.addEventListener('visibilitychange', ()=>{
    if(isFull && document.visibilityState === 'visible' && !wakeLock) requestWakeLock();
  });
  // Watchdog: cek tiap 5 detik, ambil ulang kalau terlepas tanpa event
  setInterval(()=>{
    if(isFull && document.visibilityState === 'visible' && !wakeLock) requestWakeLock();
  }, 5000);

  // ── FULLSCREEN ─────────────────────────────────────────────────────────────
  let isFull = false;
  function enterFS(){
    const el = document.documentElement;
    const fsPromise = (el.requestFullscreen?.({navigationUI:'hide'}) || el.webkitRequestFullscreen?.())
      ?.catch(()=> el.requestFullscreen?.().catch(()=>{}));
    document.body.classList.add('fs');
    isFull = true;
    // Aktifkan wake lock SETELAH fullscreen resolve (lebih andal di Android)
    const afterFs = ()=>{ requestWakeLock(); try{ screen.orientation.lock('landscape').catch(()=>{}); }catch(e){} };
    if(fsPromise && typeof fsPromise.then === 'function'){
      fsPromise.then(afterFs).catch(afterFs);
    } else {
      setTimeout(afterFs, 200);
    }
  }
  function exitFS(){
    releaseWakeLock();
    const fn = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen;
    if(fn) fn.call(document).catch(()=>{});
    document.body.classList.remove('fs');
    isFull = false;
    try{ screen.orientation.unlock(); }catch(e){}
  }

  document.body.addEventListener('click', e => {
    isFull ? exitFS() : enterFS();
  });
  ['fullscreenchange','webkitfullscreenchange'].forEach(ev =>
    document.addEventListener(ev, () => {
      if(!document.fullscreenElement && !document.webkitFullscreenElement){
        document.body.classList.remove('fs'); isFull = false; releaseWakeLock();
      }
    })
  );
  document.addEventListener('contextmenu', e => e.preventDefault());

  // Trik WebOS: kirim event mousemove dummy tiap 30 detik agar
  // screensaver TV LG tidak aktif karena menganggap user idle.
  setInterval(() => {
    document.dispatchEvent(new MouseEvent('mousemove', {
      bubbles: true, cancelable: true,
      clientX: Math.random(), clientY: Math.random()
    }));
  }, 30000);
</script>
</body>
</html>
